<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
   
    <h1 id="heading">Mini MS Word!💖</h1>
    <div class="toolbar">
  <select id="size">
   <option value="8">8</option>
   <option value="9">9</option>
   <option value="10">10</option>
   <option value="11">11</option>
   <option value="12">12</option>
   <option value="14">14</option>
   <option value="16">16</option>
   <option value="18">18</option>
   <option value="20">20</option>
   <option value="22">22</option>
   <option value="24">24</option>
   <option value="26">26</option>
   <option value="28">28</option>
   <option value="36">36</option>
   <option value="48">48</option>
   <option value="72">72</option>
  </select>
   <button id="bold"><b>Bold</b></button>
   <button id="italic"><i>Italic</i></button>
   <button id="underline"><u>Underline</u></button>
   <button id="clear">Clear</button>
<input type="color" id="color">
<select id="font">
    <option value="Broadway">Broadway</option>
    <option value="Georgia">Georgia</option>
    <option value="Lucida Handwriting">Lucida Handwriting</option>
    <option value="Cooper Black">Cooper Black</option>
    <option value="Arial">Arial</option>
    <option value="Comic Sans MS">Comic Sans MS</option>
    <option value="Algerian">Algerian</option>
    <option value="Harlow Solid Italic">Harlow Solid Italic</option>
    <option value="Franklin Gothic Mediu">Franklin Gothic Mediu</option>
    <option value="Calibri (Body)">Calibri (Body)</option>
</select>
<img src="./icons8-paint-bucket-20.png" id="paint">
<input type="color" id="bg">
<button id="left"><img src="./icons8-align-left-24.png" width="20"></button>
<button id="center"><img src="./icons8-align-center-24.png" width="20"></button>
<button id="right"><img src="./icons8-align-right-24.png" width="20"></button>
<button id="justify"><img src="./icons8-align-justify-24.png" width="20"></button>


    </div>
   
    <p id="para" contenteditable="true">Type something here...</p>

    </div>

   




    <script src="app.js"></script>
</body>
</html>
